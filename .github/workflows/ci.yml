name: CI

on:
  push:
    branches: [main, phase/**]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff black mypy
      - name: Run Ruff
        run: ruff check . --fix --exit-zero
      - name: Run Black
        run: black . --check --diff
      - name: Run MyPy
        run: mypy api worker --ignore-missing-imports || true

  test:
    name: Tests
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: procuresignal
          POSTGRES_PASSWORD: procuresignal
          POSTGRES_DB: procuresignal
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Poetry
        run: pip install poetry
      - name: Install dependencies
        run: poetry install
      - name: Run tests
        run: pytest tests/ -v --cov=api --cov=worker --cov=shared --cov-report=xml
        env:
          DATABASE_URL: postgresql+asyncpg://procuresignal:procuresignal@localhost:5432/procuresignal
          REDIS_URL: redis://localhost:6379/0
      - name: Upload coverage
        uses: codecov/codecov-action@v3
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false

  build:
    name: Build Docker images
    runs-on: ubuntu-latest
    needs: [lint, test]
    steps:
      - uses: actions/checkout@v4
      - name: Build API image
        run: docker build -t procuresignal-api:latest -f Dockerfile.api .
      - name: Build Worker image
        run: docker build -t procuresignal-worker:latest -f Dockerfile.worker .
      - name: Test API image
        run: docker run --rm procuresignal-api:latest --help
      - name: Test Worker image
        run: docker run --rm procuresignal-worker:latest --help
