
services:
  postgres:
    image: postgres:15-alpine
    container_name: procuresignal-postgres
    environment:
      POSTGRES_USER: procuresignal
      POSTGRES_PASSWORD: procuresignal
      POSTGRES_DB: procuresignal
    ports:
      - "${POSTGRES_HOST_PORT:-5434}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # ponytail: init scripts dropped — macOS bind mounts are exec'd noexec ("bad interpreter").
      # POSTGRES_PASSWORD already provisions password auth the app uses; re-add via COPY-into-image if host trust-auth is needed.
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U procuresignal"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: procuresignal-redis
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  migrate:
    build:
      context: .
      dockerfile: Dockerfile.api
    platform: linux/amd64  # blis (spaCy dep) has no linux/arm64 wheel; run amd64 under emulation
    container_name: procuresignal-migrate
    environment:
      DATABASE_URL: postgresql+asyncpg://procuresignal:procuresignal@postgres:5432/procuresignal
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./shared:/app/shared
      - ./migrations:/app/migrations
      - ./alembic.ini:/app/alembic.ini
    command: alembic upgrade head
    restart: "no"

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    platform: linux/amd64  # blis (spaCy dep) has no linux/arm64 wheel; run amd64 under emulation
    container_name: procuresignal-api
    environment:
      DATABASE_URL: postgresql+asyncpg://procuresignal:procuresignal@postgres:5432/procuresignal
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      LOG_LEVEL: INFO
      ENABLE_APSCHEDULER: ${ENABLE_APSCHEDULER:-false}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-nano}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      GDELT_ENABLED: ${GDELT_ENABLED:-false}
      SOURCE_EU_COMMISSION_PRESS_ENABLED: ${SOURCE_EU_COMMISSION_PRESS_ENABLED:-true}
      SOURCE_EU_COUNCIL_PRESS_ENABLED: ${SOURCE_EU_COUNCIL_PRESS_ENABLED:-false}
      SOURCE_ECB_PRESS_ENABLED: ${SOURCE_ECB_PRESS_ENABLED:-true}
      SOURCE_EU_FINANCIAL_SANCTIONS_ENABLED: ${SOURCE_EU_FINANCIAL_SANCTIONS_ENABLED:-false}
      SOURCE_EUROSTAT_UPDATES_ENABLED: ${SOURCE_EUROSTAT_UPDATES_ENABLED:-true}
      SOURCE_FREIGHTWAVES_ENABLED: ${SOURCE_FREIGHTWAVES_ENABLED:-false}
      SOURCE_MINING_COM_ENABLED: ${SOURCE_MINING_COM_ENABLED:-true}
      SOURCE_OILPRICE_ENABLED: ${SOURCE_OILPRICE_ENABLED:-true}
      SOURCE_SUPPLY_CHAIN_DIVE_ENABLED: ${SOURCE_SUPPLY_CHAIN_DIVE_ENABLED:-true}
      SOURCE_DW_BUSINESS_ENABLED: ${SOURCE_DW_BUSINESS_ENABLED:-true}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./api:/app/api
      - ./shared:/app/shared
      - ./worker:/app/worker
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
        NEXT_PUBLIC_WS_URL: ws://localhost:8000
    container_name: procuresignal-frontend
    ports:
      - "3002:3000"  # host 3002 (3000 is a common local conflict); API URL is baked at build so this is host-only
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    platform: linux/amd64  # blis (spaCy dep) has no linux/arm64 wheel; run amd64 under emulation
    container_name: procuresignal-worker
    environment:
      DATABASE_URL: postgresql+asyncpg://procuresignal:procuresignal@postgres:5432/procuresignal
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LOG_LEVEL: INFO
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-nano}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      GDELT_ENABLED: ${GDELT_ENABLED:-false}
      SOURCE_EU_COMMISSION_PRESS_ENABLED: ${SOURCE_EU_COMMISSION_PRESS_ENABLED:-true}
      SOURCE_EU_COUNCIL_PRESS_ENABLED: ${SOURCE_EU_COUNCIL_PRESS_ENABLED:-false}
      SOURCE_ECB_PRESS_ENABLED: ${SOURCE_ECB_PRESS_ENABLED:-true}
      SOURCE_EU_FINANCIAL_SANCTIONS_ENABLED: ${SOURCE_EU_FINANCIAL_SANCTIONS_ENABLED:-false}
      SOURCE_EUROSTAT_UPDATES_ENABLED: ${SOURCE_EUROSTAT_UPDATES_ENABLED:-true}
      SOURCE_FREIGHTWAVES_ENABLED: ${SOURCE_FREIGHTWAVES_ENABLED:-false}
      SOURCE_MINING_COM_ENABLED: ${SOURCE_MINING_COM_ENABLED:-true}
      SOURCE_OILPRICE_ENABLED: ${SOURCE_OILPRICE_ENABLED:-true}
      SOURCE_SUPPLY_CHAIN_DIVE_ENABLED: ${SOURCE_SUPPLY_CHAIN_DIVE_ENABLED:-true}
      SOURCE_DW_BUSINESS_ENABLED: ${SOURCE_DW_BUSINESS_ENABLED:-true}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    volumes:
      - ./worker:/app/worker
      - ./shared:/app/shared
    command: celery -A worker.main worker --loglevel=info --queues=retrieval,processing,enrichment,personalization,default

  beat:
    build:
      context: .
      dockerfile: Dockerfile.worker
    platform: linux/amd64  # blis (spaCy dep) has no linux/arm64 wheel; run amd64 under emulation
    container_name: procuresignal-beat
    environment:
      DATABASE_URL: postgresql+asyncpg://procuresignal:procuresignal@postgres:5432/procuresignal
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      LOG_LEVEL: INFO
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      worker:
        condition: service_started
    volumes:
      - ./worker:/app/worker
      - ./shared:/app/shared
    command: celery -A worker.main beat --loglevel=info

  bootstrap:
    build:
      context: .
      dockerfile: Dockerfile.worker
    platform: linux/amd64  # blis (spaCy dep) has no linux/arm64 wheel; run amd64 under emulation
    container_name: procuresignal-bootstrap
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-gpt-5.4-nano}
      NEWSAPI_KEY: ${NEWSAPI_KEY:-}
      GDELT_ENABLED: ${GDELT_ENABLED:-false}
      SOURCE_EU_COMMISSION_PRESS_ENABLED: ${SOURCE_EU_COMMISSION_PRESS_ENABLED:-true}
      SOURCE_EU_COUNCIL_PRESS_ENABLED: ${SOURCE_EU_COUNCIL_PRESS_ENABLED:-false}
      SOURCE_ECB_PRESS_ENABLED: ${SOURCE_ECB_PRESS_ENABLED:-true}
      SOURCE_EU_FINANCIAL_SANCTIONS_ENABLED: ${SOURCE_EU_FINANCIAL_SANCTIONS_ENABLED:-false}
      SOURCE_EUROSTAT_UPDATES_ENABLED: ${SOURCE_EUROSTAT_UPDATES_ENABLED:-true}
      SOURCE_FREIGHTWAVES_ENABLED: ${SOURCE_FREIGHTWAVES_ENABLED:-false}
      SOURCE_MINING_COM_ENABLED: ${SOURCE_MINING_COM_ENABLED:-true}
      SOURCE_OILPRICE_ENABLED: ${SOURCE_OILPRICE_ENABLED:-true}
      SOURCE_SUPPLY_CHAIN_DIVE_ENABLED: ${SOURCE_SUPPLY_CHAIN_DIVE_ENABLED:-true}
      SOURCE_DW_BUSINESS_ENABLED: ${SOURCE_DW_BUSINESS_ENABLED:-true}
    depends_on:
      redis:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      worker:
        condition: service_started
    volumes:
      - ./scripts:/app/scripts
      - ./shared:/app/shared
      - ./worker:/app/worker
    command: python /app/scripts/bootstrap_pipeline.py
    restart: "no"

  flower:
    image: mher/flower:2.0
    container_name: procuresignal-flower
    environment:
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    depends_on:
      redis:
        condition: service_healthy
      worker:
        condition: service_started
    ports:
      - "5555:5555"

  grafana:
    image: grafana/grafana:latest
    container_name: procuresignal-grafana
    environment:
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: 'false'
    ports:
      - "3001:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

  prometheus:
    image: prom/prometheus:latest
    container_name: procuresignal-prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'

volumes:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:
